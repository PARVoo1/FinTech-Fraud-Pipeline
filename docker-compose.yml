services:
  # 1. The Highway (Kafka KRaft)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: fintech_kafka_broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'FinTech-Cluster-12345'
    networks:
      - fintech_network
  kafka-init:
    image: confluentinc/cp-kafka:latest
    container_name: kafka_topic_builder
    depends_on:
      - kafka
    networks:
      - fintech_network
    command: >
      bash -c "
      echo '⏳ Waiting for Kafka to wake up...' &&
      sleep 10 &&
      echo '🚧 Building the Kafka Highways...' &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic fraud-detection-queue &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic fraud-results-queue &&
      echo '✅ All Topics Created Successfully! I can go to sleep now.'
      "

  # 2. The Brain (Python Worker)
  python-ml-worker:
    build:
      context: ./python-ml-app
    container_name: fintech_python_worker
    depends_on:
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BROKER_URL=kafka:9092
    networks:
      - fintech_network

  # 3. The Front Door (Spring Boot API)
  fintech-api:
    build:
      context: ./FintechApp
    container_name: fintech_spring_api
    ports:
      - "8081:8081"
    depends_on:
      - kafka
    env_file:
      - .env
    environment:
      # We removed "PRODUCER" so this applies to everything!
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - fintech_network
networks:
  fintech_network:
    driver: bridge